<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romanian Trainer B1</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 400px;
  text-align: center;
}
button, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
}
#feedback {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="box">
  <h2>Romanian B1 Smart Mode</h2>
  <div id="question"></div>
  <input id="answer" placeholder="Type your answer">
  <button onclick="checkAnswer()">Check</button>
  <div id="feedback"></div>
</div>

<script>

const vocab = [
  { ro: "muncă", en: "work" },
  { ro: "problemă", en: "problem" },
  { ro: "răspuns", en: "answer" },
  { ro: "motiv", en: "reason" },
  { ro: "primăvară", en: "spring" },
  { ro: "roșu", en: "red" },
  { ro: "măr", en: "apple" },
  { ro: "morcov", en: "carrot" }
];

const verbs = [
  {
    infinitive: "a merge",
    en: "to go",
    forms: {
      "I": "merg",
      "you": "mergi",
      "he": "merge",
      "we": "mergem",
      "you(pl)": "mergeți",
      "they": "merg"
    }
  },
  {
    infinitive: "a avea",
    en: "to have",
    forms: {
      "I": "am",
      "you": "ai",
      "he": "are",
      "we": "avem",
      "you(pl)": "aveți",
      "they": "au"
    }
  }
];

let current = {};
let mode = "";

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateQuestion() {
  const rand = Math.random();

  if (rand < 0.5) {
    mode = "conjugation";
    const verb = randomItem(verbs);
    const persons = Object.keys(verb.forms);
    const person = randomItem(persons);
    current = {
      correct: verb.forms[person],
      question: `${person} ${verb.en}`
    };
  }
  else if (rand < 0.8) {
    mode = "en-ro";
    const item = randomItem(vocab);
    current = {
      correct: item.ro,
      question: item.en
    };
  }
  else {
    mode = "ro-en";
    const item = randomItem(vocab);
    current = {
      correct: item.en,
      question: item.ro
    };
  }

  document.getElementById("question").innerText = current.question;
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerText = "";
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim().toLowerCase();
  if (input === current.correct.toLowerCase()) {
    document.getElementById("feedback").innerText = "Correct ✔️";
  } else {
    document.getElementById("feedback").innerText =
      "Wrong. Correct: " + current.correct;
  }
  setTimeout(generateQuestion, 800);
}

generateQuestion();

</script>
</body>
</html>
