<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romanian Advanced Trainer</title>

<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:white;padding:20px;border-radius:12px;width:100%;max-width:650px;text-align:center}
input,select,button{width:100%;padding:8px;margin-top:6px;font-size:15px}
.word{font-size:22px;font-weight:bold;margin-bottom:10px}
.hidden{display:none}
#feedback{margin-top:10px;font-weight:bold}
.error{border:2px solid red}
.correctAnswer{font-size:12px;color:red}
</style>
</head>
<body>
<div class="box">

<h2>Romanian Advanced Trainer</h2>

<div id="questionArea">
  <div class="word" id="word"></div>
  <div id="dynamicFields"></div>
  <button onclick="checkAnswer()">Check</button>
  <div id="feedback"></div>
</div>

</div>

<script>

const DATA = [
{
type:"verb",
ro:"a merge",
en:"to go",
he:"ללכת",
forms:{eu:"merg",tu:"mergi",el:"merge",noi:"mergem",voi:"mergeți",ei:"merg"}
},
{
type:"noun",
ro:"copil",
en:"child",
he:"ילד",
gender:"masculine",
plural:"copii"
}
];

let index = 0;
let current;

function loadItem(){
  current = DATA[index];
  document.getElementById("word").innerText = current.ro;
  const container = document.getElementById("dynamicFields");
  container.innerHTML = "";
  document.getElementById("feedback").innerText = "";

  if(current.type === "verb"){
    container.innerHTML += `<input id="infinitive" placeholder="Infinitive (English or Hebrew)">`;
    for(let person in current.forms){
      container.innerHTML += `
        <input id="${person}" placeholder="${person} form">
        <div id="${person}_correct" class="correctAnswer"></div>
      `;
    }
  }

  if(current.type === "noun"){
    container.innerHTML += `
      <input id="translation" placeholder="Translation (English or Hebrew)">
      <div id="translation_correct" class="correctAnswer"></div>
    `;
    container.innerHTML += `
      <select id="gender">
        <option value="">Select gender</option>
        <option value="masculine">masculine</option>
        <option value="feminine">feminine</option>
        <option value="neuter">neuter</option>
      </select>
      <div id="gender_correct" class="correctAnswer"></div>
    `;
    container.innerHTML += `
      <input id="plural" placeholder="Plural form">
      <div id="plural_correct" class="correctAnswer"></div>
    `;
  }
}

function checkAnswer(){
  let correct = true;

  if(current.type === "verb"){
    const infField = document.getElementById("infinitive");
    const inf = infField.value.trim().toLowerCase();
    infField.classList.remove("error");

    if(inf !== current.en.toLowerCase() && inf !== current.he.toLowerCase()){
      correct = false;
      infField.classList.add("error");
      document.getElementById("feedback").innerText =
        "Wrong infinitive: correct is " + current.en;
    }

    for(let person in current.forms){
      const field = document.getElementById(person);
      const correctDiv = document.getElementById(person + "_correct");
      field.classList.remove("error");
      correctDiv.innerText = "";

      if(field.value.trim() !== current.forms[person]){
        correct = false;
        field.classList.add("error");
        correctDiv.innerText = "Correct: " + current.forms[person];
      }
    }
  }

  if(current.type === "noun"){
    const transField = document.getElementById("translation");
    const genderField = document.getElementById("gender");
    const pluralField = document.getElementById("plural");

    const trans = transField.value.trim().toLowerCase();
    transField.classList.remove("error");
    document.getElementById("translation_correct").innerText = "";

    if(trans !== current.en.toLowerCase() && trans !== current.he.toLowerCase()){
      correct = false;
      transField.classList.add("error");
      document.getElementById("translation_correct").innerText =
        "Correct: " + current.en + " / " + current.he;
    }

    if(genderField.value !== current.gender){
      correct = false;
      genderField.classList.add("error");
      document.getElementById("gender_correct").innerText =
        "Correct: " + current.gender;
    }

    if(pluralField.value.trim() !== current.plural){
      correct = false;
      pluralField.classList.add("error");
      document.getElementById("plural_correct").innerText =
        "Correct: " + current.plural;
    }
  }

  if(correct){
    document.getElementById("feedback").innerText = "Correct ✔️";
    setTimeout(()=>{
      index = (index + 1) % DATA.length;
      loadItem();
    }, 1200);
  }
}

loadItem();

</script>
</body>
</html>
