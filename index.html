<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romanian Advanced Trainer</title>
<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:white;padding:20px;border-radius:12px;width:100%;max-width:650px;text-align:center}
input,select,button{width:100%;padding:8px;margin-top:6px;font-size:15px}
.word{font-size:22px;font-weight:bold;margin-bottom:10px}
.hidden{display:none}
#feedback{margin-top:10px;font-weight:bold}
</style>
</head>
<body>
<div class="box">

<h2>Romanian Advanced Trainer</h2>

<div id="questionArea">
  <div class="word" id="word"></div>
  <div id="dynamicFields"></div>
  <button onclick="checkAnswer()">Check</button>
  <div id="feedback"></div>
</div>

</div>

<script>

const DATA = [
{
type:"verb",
ro:"a merge",
en:"to go",
he:"ללכת",
forms:{eu:"merg",tu:"mergi",el:"merge",noi:"mergem",voi:"mergeți",ei:"merg"}
},
{
type:"noun",
ro:"copil",
en:"child",
he:"ילד",
gender:"masculine",
plural:"copii"
}
];

let index = 0;
let current = DATA[index];

function loadItem(){
  current = DATA[index];
  document.getElementById("word").innerText = current.ro;
  const container = document.getElementById("dynamicFields");
  container.innerHTML = "";

  if(current.type === "verb"){
    container.innerHTML += `<input id="infinitive" placeholder="Infinitive (English or Hebrew)">`;
    for(let person in current.forms){
      container.innerHTML += `<input id="${person}" placeholder="${person} form">`;
    }
  }

  if(current.type === "noun"){
    container.innerHTML += `<input id="translation" placeholder="Translation (English or Hebrew)">`;
    container.innerHTML += `
      <select id="gender">
        <option value="">Select gender</option>
        <option value="masculine">masculine</option>
        <option value="feminine">feminine</option>
        <option value="neuter">neuter</option>
      </select>
    `;
    container.innerHTML += `<input id="plural" placeholder="Plural form">`;
  }

  document.getElementById("feedback").innerText = "";
}

function checkAnswer(){
  let correct = true;

  if(current.type === "verb"){
    const inf = document.getElementById("infinitive").value.trim().toLowerCase();
    if(inf !== current.en.toLowerCase() && inf !== current.he.toLowerCase()){
      correct = false;
    }

    for(let person in current.forms){
      const val = document.getElementById(person).value.trim();
      if(val !== current.forms[person]){
        correct = false;
      }
    }
  }

  if(current.type === "noun"){
    const trans = document.getElementById("translation").value.trim().toLowerCase();
    const gen = document.getElementById("gender").value;
    const pl = document.getElementById("plural").value.trim();

    if(trans !== current.en.toLowerCase() && trans !== current.he.toLowerCase()){
      correct = false;
    }
    if(gen !== current.gender){
      correct = false;
    }
    if(pl !== current.plural){
      correct = false;
    }
  }

  if(correct){
    document.getElementById("feedback").innerText = "Correct ✔️";
  } else {
    document.getElementById("feedback").innerText = "Wrong – check answers.";
  }

  index = (index + 1) % DATA.length;
  setTimeout(loadItem, 1200);
}

loadItem();

</script>
</body>
</html>
