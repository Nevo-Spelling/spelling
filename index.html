<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romanian Trainer</title>

<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:white;padding:20px;border-radius:12px;width:100%;max-width:900px;text-align:center}
button,input,select{width:100%;padding:8px;margin-top:6px;font-size:14px}
.word{font-size:22px;font-weight:bold;margin-bottom:10px}
.hidden{display:none}
.error{border:2px solid red}
.correctAnswer{font-size:12px;color:red;margin-bottom:4px}
#feedback{margin-top:10px;font-weight:bold}
.row button{width:48%;display:inline-block}
.stats{margin-top:15px;text-align:left;font-size:14px}
</style>
</head>
<body>

<div class="box">

<h2>Romanian Trainer</h2>

<div id="menu">
  <div class="row">
    <button onclick="start('verbs')">Verbs</button>
    <button onclick="start('nouns')">Nouns</button>
  </div>
  <button onclick="start('mixed')">Mixed</button>

  <div class="row">
    <button onclick="setMode('study')">Study</button>
    <button onclick="setMode('test')">Test</button>
  </div>

  <button onclick="showStats()">Statistics</button>
</div>

<div id="trainer" class="hidden">
  <div class="word" id="word"></div>
  <div id="fields"></div>
  <button onclick="checkAnswer()">Check</button>
  <div id="feedback"></div>
  <button onclick="nextItem()">Next</button>
  <button onclick="backToMenu()">Back</button>
</div>

<div id="statistics" class="hidden stats"></div>

</div>

<script>

/* ===== DATABASE ===== */

const DATA = {

verbs:[
{type:"verb",ro:"a merge",en:"to go",he:"ללכת",
forms:{eu:"merg",tu:"mergi",el:"merge",noi:"mergem",voi:"mergeți",ei:"merg"}},

{type:"verb",ro:"a avea",en:"to have",he:"יש",
forms:{eu:"am",tu:"ai",el:"are",noi:"avem",voi:"aveți",ei:"au"}},

{type:"verb",ro:"a învăța",en:"to learn",he:"ללמוד",
forms:{eu:"învăț",tu:"înveți",el:"învață",noi:"învățăm",voi:"învățați",ei:"învață"}}
],

nouns:[
{type:"noun",ro:"copil",en:"child",he:"ילד",gender:"masculine",plural:"copii"},
{type:"noun",ro:"oraș",en:"city",he:"עיר",gender:"neuter",plural:"orașe"},
{type:"noun",ro:"copac",en:"tree",he:"עץ",gender:"masculine",plural:"copaci"}
]

};

/* ===== STATE ===== */

let currentCategory=[];
let currentItem=null;
let index=0;
let mode="study";
let reinforcement=[];

/* ===== STORAGE ===== */

function saveStats(data){
  localStorage.setItem("roStats",JSON.stringify(data));
}
function getStats(){
  return JSON.parse(localStorage.getItem("roStats")||"{}");
}
function updateStats(correct){
  let s=getStats();
  s.total=(s.total||0)+1;
  if(correct) s.correct=(s.correct||0)+1;
  saveStats(s);
}

/* ===== FLOW ===== */

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function start(cat){
  if(cat==="mixed"){
    currentCategory=shuffle([...DATA.verbs,...DATA.nouns]);
  }else{
    currentCategory=shuffle(DATA[cat]);
  }
  index=0;
  reinforcement=[];
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("trainer").classList.remove("hidden");
  loadItem();
}

function setMode(m){
  mode=m;
  index=0;
  reinforcement=[];
  loadItem();
}

function loadItem(){
  if(index>=currentCategory.length){
    if(reinforcement.length>0){
      alert("Reinforcement Round");
      currentCategory=shuffle(reinforcement);
      reinforcement=[];
      index=0;
    }else{
      alert("Round Finished");
      backToMenu();
      return;
    }
  }

  currentItem=currentCategory[index];
  document.getElementById("word").innerText=currentItem.ro;
  const container=document.getElementById("fields");
  container.innerHTML="";
  document.getElementById("feedback").innerText="";

  if(mode==="study"){
    container.innerHTML=`<button onclick="showStudy()">Show Meaning</button>
      <div id="studyBox" class="hidden"></div>`;
  }else{
    if(currentItem.type==="verb"){
      container.innerHTML=`<input id="inf" placeholder="Infinitive">`;
      for(let p in currentItem.forms){
        container.innerHTML+=`<input id="${p}" placeholder="${p}">`;
        container.innerHTML+=`<div id="${p}_correct" class="correctAnswer"></div>`;
      }
    }

    if(currentItem.type==="noun"){
      container.innerHTML=`
        <input id="translation" placeholder="Translation">
        <div id="translation_correct" class="correctAnswer"></div>
        <select id="gender">
          <option value="">Select gender</option>
          <option value="masculine">masculine</option>
          <option value="feminine">feminine</option>
          <option value="neuter">neuter</option>
        </select>
        <div id="gender_correct" class="correctAnswer"></div>
        <input id="plural" placeholder="Plural">
        <div id="plural_correct" class="correctAnswer"></div>
      `;
    }
  }
}

function showStudy(){
  const box=document.getElementById("studyBox");
  let html=`<b>English:</b> ${currentItem.en}<br>
            <b>עברית:</b> ${currentItem.he}<br>`;
  if(currentItem.type==="noun"){
    html+=`<b>Gender:</b> ${currentItem.gender}<br>
           <b>Plural:</b> ${currentItem.plural}<br>`;
  }
  if(currentItem.type==="verb"){
    html+=`<b>Present:</b><br>`;
    for(let p in currentItem.forms){
      html+=`${p}: ${currentItem.forms[p]}<br>`;
    }
  }
  box.innerHTML=html;
  box.classList.remove("hidden");
}

function checkAnswer(){
  let correct=true;

  if(currentItem.type==="verb"){
    const inf=document.getElementById("inf");
    if(inf.value.trim().toLowerCase()!==currentItem.en.toLowerCase()
      && inf.value.trim().toLowerCase()!==currentItem.he.toLowerCase()){
      correct=false;
      inf.classList.add("error");
    }
    for(let p in currentItem.forms){
      const field=document.getElementById(p);
      if(field.value.trim()!==currentItem.forms[p]){
        correct=false;
        field.classList.add("error");
        document.getElementById(p+"_correct").innerText=
          "Correct: "+currentItem.forms[p];
        reinforcement.push(currentItem);
      }
    }
  }

  if(currentItem.type==="noun"){
    const tr=document.getElementById("translation");
    const gen=document.getElementById("gender");
    const pl=document.getElementById("plural");

    if(tr.value.trim().toLowerCase()!==currentItem.en.toLowerCase()
      && tr.value.trim().toLowerCase()!==currentItem.he.toLowerCase()){
      correct=false;
      tr.classList.add("error");
    }

    if(gen.value!==currentItem.gender){
      correct=false;
      gen.classList.add("error");
      reinforcement.push(currentItem);
    }

    if(pl.value.trim()!==currentItem.plural){
      correct=false;
      pl.classList.add("error");
      reinforcement.push(currentItem);
    }
  }

  updateStats(correct);
  document.getElementById("feedback").innerText=
    correct?"Correct ✔️":"Errors shown above";
}

function nextItem(){
  index++;
  loadItem();
}

function showStats(){
  const s=getStats();
  const percent=s.total?Math.round((s.correct/s.total)*100):0;
  document.getElementById("statistics").classList.remove("hidden");
  document.getElementById("statistics").innerHTML=
    `<b>Total Attempts:</b> ${s.total||0}<br>
     <b>Correct:</b> ${s.correct||0}<br>
     <b>Success Rate:</b> ${percent}%`;
}

function backToMenu(){
  document.getElementById("trainer").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("statistics").classList.add("hidden");
}

</script>

</body>
</html>
