<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romanian Trainer Pro</title>

<style>
body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:white;padding:20px;border-radius:12px;width:100%;max-width:900px;text-align:center}
button,input,select{width:100%;padding:8px;margin-top:6px;font-size:14px}
.word{font-size:22px;font-weight:bold;margin-bottom:10px}
.hidden{display:none}
.error{border:2px solid red}
.correctAnswer{font-size:12px;color:red;margin-bottom:4px}
#feedback{margin-top:10px;font-weight:bold}
.row button{width:48%;display:inline-block}
</style>
</head>
<body>

<div class="box">
<h2>Romanian Trainer Pro</h2>

<div id="menu">
  <button onclick="start('verbs')">Verbs</button>
  <button onclick="start('nouns')">Nouns</button>
  <button onclick="start('colors')">Colors</button>
  <button onclick="start('fruits')">Fruits</button>
  <button onclick="start('vegetables')">Vegetables</button>
  <button onclick="start('function')">Function Words</button>
  <button onclick="start('mixed')">Mixed</button>
</div>

<div id="trainer" class="hidden">
  <div class="word" id="word"></div>
  <div id="fields"></div>
  <button onclick="checkAnswer()">Check</button>
  <div id="feedback"></div>
  <button onclick="nextItem()">Next</button>
  <button onclick="backToMenu()">Back</button>
</div>

</div>

<script>

let DATA = {};
let currentCategory = [];
let currentItem = null;
let index = 0;

fetch("data.json")
  .then(res => res.json())
  .then(data => {
    DATA = data;
  });

function shuffle(arr){
  return [...arr].sort(() => Math.random() - 0.5);
}

function start(cat){
  if(cat === "mixed"){
    currentCategory = shuffle([
      ...DATA.verbs,
      ...DATA.nouns,
      ...DATA.colors,
      ...DATA.fruits,
      ...DATA.vegetables,
      ...DATA.function
    ]);
  } else {
    currentCategory = shuffle(DATA[cat]);
  }

  index = 0;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("trainer").classList.remove("hidden");
  loadItem();
}

function loadItem(){
  if(index >= currentCategory.length){
    alert("Round finished");
    backToMenu();
    return;
  }

  currentItem = currentCategory[index];
  document.getElementById("word").innerText = currentItem.ro;
  const container = document.getElementById("fields");
  container.innerHTML = "";

  if(currentItem.type === "word"){
    container.innerHTML = `<input id="translation" placeholder="Translation (English or Hebrew)">`;
  }

  if(currentItem.type === "noun"){
    container.innerHTML = `
      <input id="translation" placeholder="Translation">
      <select id="gender">
        <option value="">Select gender</option>
        <option value="masculine">masculine</option>
        <option value="feminine">feminine</option>
        <option value="neuter">neuter</option>
      </select>
      <input id="plural" placeholder="Plural">
    `;
  }

  if(currentItem.type === "verb"){
    container.innerHTML = `
      <input id="inf" placeholder="Infinitive">
    `;
    for(let p in currentItem.forms){
      container.innerHTML += `<input id="${p}" placeholder="${p}">`;
    }
  }

  document.getElementById("feedback").innerText = "";
}

function checkAnswer(){
  let correct = true;

  if(currentItem.type === "word"){
    const tr = document.getElementById("translation").value.trim().toLowerCase();
    if(tr !== currentItem.en.toLowerCase() && tr !== currentItem.he.toLowerCase()){
      correct = false;
    }
  }

  if(currentItem.type === "noun"){
    const tr = document.getElementById("translation").value.trim().toLowerCase();
    const gen = document.getElementById("gender").value;
    const pl = document.getElementById("plural").value.trim();

    if(tr !== currentItem.en.toLowerCase() && tr !== currentItem.he.toLowerCase()){
      correct = false;
    }
    if(gen !== currentItem.gender) correct = false;
    if(pl !== currentItem.plural) correct = false;
  }

  if(currentItem.type === "verb"){
    const inf = document.getElementById("inf").value.trim().toLowerCase();
    if(inf !== currentItem.en.toLowerCase() && inf !== currentItem.he.toLowerCase()){
      correct = false;
    }
    for(let p in currentItem.forms){
      if(document.getElementById(p).value.trim() !== currentItem.forms[p]){
        correct = false;
      }
    }
  }

  document.getElementById("feedback").innerText =
    correct ? "Correct ✔️" : "Wrong";
}

function nextItem(){
  index++;
  loadItem();
}

function backToMenu(){
  document.getElementById("trainer").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

</script>
</body>
</html>
